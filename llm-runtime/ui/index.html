<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuperLlama — Local LLM Chat</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --accent: #7c3aed;
  --accent2: #a78bfa;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #d29922;
  --font: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  --radius: 10px;
}

html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* ---- HEADER ---- */
header {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 18px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  min-height: 52px;
}
header .logo {
  font-size: 20px; color: var(--accent2);
}
header h1 {
  font-size: 15px; font-weight: 600; letter-spacing: -0.3px;
}
header .status {
  margin-left: auto;
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text2);
}
header .dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--green);
  box-shadow: 0 0 6px var(--green);
}
header .dot.offline { background: var(--red); box-shadow: 0 0 6px var(--red); }

/* ---- SIDEBAR ---- */
.layout { display: flex; flex: 1; overflow: hidden; }
.sidebar {
  width: 260px; background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  flex-shrink: 0;
}
.sidebar-section {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
}
.sidebar-section label {
  display: block; font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.6px; color: var(--text2); margin-bottom: 6px;
}
.sidebar select, .sidebar input[type=range] {
  width: 100%; padding: 7px 10px;
  background: var(--surface2); color: var(--text);
  border: 1px solid var(--border); border-radius: 6px;
  font-size: 13px; outline: none;
}
.sidebar select:focus { border-color: var(--accent); }
.sidebar .range-row {
  display: flex; align-items: center; gap: 8px;
}
.sidebar .range-row span {
  font-size: 12px; color: var(--text2); min-width: 32px; text-align: right;
}
.sidebar .models-list {
  flex: 1; overflow-y: auto; padding: 4px 0;
}
.sidebar .models-list .model-item {
  padding: 8px 14px; font-size: 12px; cursor: pointer;
  border-left: 3px solid transparent;
  color: var(--text2); transition: 0.12s;
  display: flex; justify-content: space-between; align-items: center;
}
.sidebar .models-list .model-item:hover {
  background: var(--surface2); color: var(--text);
}
.sidebar .models-list .model-item.active {
  border-left-color: var(--accent); color: var(--text);
  background: rgba(124,58,237,0.08);
}
.sidebar .models-list .model-item .size {
  font-size: 10px; color: var(--text2); margin-left: 6px;
}
.sidebar .model-actions {
  padding: 12px 14px;
  border-top: 1px solid var(--border);
}

/* ---- CHAT ---- */
.main {
  flex: 1; display: flex; flex-direction: column;
  min-width: 0; background: var(--bg);
}
.chat-area {
  flex: 1; overflow-y: auto; padding: 16px 20px;
  display: flex; flex-direction: column; gap: 14px;
}
.chat-area .empty-state {
  margin: auto; text-align: center; color: var(--text2);
  max-width: 420px;
}
.chat-area .empty-state .icon { font-size: 48px; margin-bottom: 14px; }
.chat-area .empty-state h2 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
.chat-area .empty-state p { font-size: 13px; line-height: 1.5; }

.msg {
  display: flex; gap: 10px; max-width: 85%;
  animation: fadeIn 0.18s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.assistant { align-self: flex-start; }

.msg .avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}
.msg.user .avatar { background: var(--surface2); }
.msg.assistant .avatar { background: rgba(124,58,237,0.25); }

.msg .bubble {
  padding: 10px 14px; border-radius: var(--radius);
  font-size: 13.5px; line-height: 1.55;
  white-space: pre-wrap; word-break: break-word;
}
.msg.user .bubble { background: var(--surface2); color: var(--text); border-top-right-radius: 4px; }
.msg.assistant .bubble { background: var(--surface); color: var(--text); border-top-left-radius: 4px; border: 1px solid var(--border); }

.msg .bubble .cursor {
  display: inline-block; width: 7px; height: 15px;
  background: var(--accent2); vertical-align: text-bottom;
  margin-left: 1px; animation: blink 0.8s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* ---- INPUT ---- */
.input-bar {
  display: flex; gap: 10px; padding: 12px 18px;
  background: var(--surface); border-top: 1px solid var(--border);
  align-items: flex-end;
}
.input-bar textarea {
  flex: 1; resize: none; padding: 10px 14px;
  border-radius: var(--radius); border: 1px solid var(--border);
  background: var(--surface2); color: var(--text);
  font-family: var(--font); font-size: 13.5px; line-height: 1.45;
  outline: none; min-height: 44px; max-height: 160px;
}
.input-bar textarea:focus { border-color: var(--accent); }
.input-bar textarea::placeholder { color: var(--text2); }

.btn {
  padding: 10px 16px; border: none; border-radius: var(--radius);
  font-family: var(--font); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: 0.12s; white-space: nowrap;
  display: flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #6d28d9; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); }
.btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
.btn-danger:hover { background: rgba(248,81,73,0.1); }

/* ---- MODAL ---- */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  display: none; align-items: center; justify-content: center; z-index: 100;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 22px 24px; min-width: 380px; max-width: 480px;
}
.modal h2 { font-size: 16px; margin-bottom: 14px; }
.modal input {
  width: 100%; padding: 9px 12px; border: 1px solid var(--border);
  border-radius: 7px; background: var(--surface2); color: var(--text);
  font-size: 13px; margin-bottom: 12px; outline: none;
}
.modal input:focus { border-color: var(--accent); }
.modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }

/* ---- RESPONSIVE ---- */
@media (max-width: 700px) {
  .sidebar { display: none; }
  .msg { max-width: 92%; }
}

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <span class="logo">🦙</span>
  <h1>SuperLlama</h1>
  <div class="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Connecting...</span>
  </div>
  <button class="btn btn-secondary" style="margin-left:auto;" onclick="refreshModels()" title="Refresh models">⟳</button>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <label>Model</label>
      <select id="modelSelect" onchange="onModelChange()">
        <option value="">No model loaded</option>
      </select>
    </div>
    <div class="sidebar-section">
      <label>Temperature <span id="tempVal">0.7</span></label>
      <div class="range-row">
        <input type="range" id="temperature" min="0" max="2" step="0.05" value="0.7" oninput="document.getElementById('tempVal').textContent=this.value">
      </div>
    </div>
    <div class="sidebar-section">
      <label>Max Tokens <span id="tokVal">512</span></label>
      <div class="range-row">
        <input type="range" id="maxTokens" min="16" max="4096" step="16" value="512" oninput="document.getElementById('tokVal').textContent=this.value">
      </div>
    </div>
    <div class="sidebar-section">
      <label>Top-P <span id="topPVal">0.9</span></label>
      <div class="range-row">
        <input type="range" id="topP" min="0" max="1" step="0.05" value="0.9" oninput="document.getElementById('topPVal').textContent=this.value">
      </div>
    </div>
    <div class="sidebar-section">
      <label>Download Model (>40B)</label>
      <select id="downloadModelSelect" onchange="onDownloadModelSelect()">
        <option value="">-- Select a model to download --</option>
        <option value="bartowski/Llama-3.3-70B-Instruct-GGUF">Llama 3.3 70B</option>
        <option value="bartowski/Meta-Llama-3.1-70B-Instruct-GGUF">Llama 3.1 70B</option>
        <option value="Qwen/Qwen2-72B-Instruct-GGUF">Qwen2 72B</option>
        <option value="bartowski/Qwen2.5-72B-Instruct-GGUF">Qwen2.5 72B</option>
        <option value="MaziyarPanahi/Mixtral-8x22B-v0.1-GGUF">Mixtral 8x22B</option>
        <option value="bartowski/DeepSeek-R1-Distill-Llama-70B-GGUF">DeepSeek-R1 70B</option>
        <option value="TheBloke/Command-R-Plus-GGUF">Command-R-Plus (104B)</option>
        <option value="TheBloke/Llama-2-70B-GGUF">Llama 2 70B</option>
      </select>
    </div>
    <div class="sidebar-section" id="downloadFilenameSection" style="display:none;">
      <label>GGUF Filename</label>
      <input type="text" id="downloadFilename" placeholder="e.g. llama-3-70b.Q4_K_M.gguf" style="width:100%;padding:7px 10px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none;">
    </div>
    <div class="model-actions" style="display:flex;gap:6px;">
      <button class="btn btn-primary" id="downloadBtn" onclick="downloadSelectedModel()" disabled style="flex:1;">⬇ Download</button>
    </div>
    <div id="downloadStatus" style="padding:4px 14px 10px;font-size:11px;color:var(--yellow);max-height:80px;overflow-y:auto;"></div>
  </aside>

  <!-- MAIN CHAT -->
  <main class="main">
    <div class="chat-area" id="chatArea">
      <div class="empty-state" id="emptyState">
        <div class="icon">🦙</div>
        <h2>Welcome to SuperLlama</h2>
        <p>High-performance LLM inference — entirely on your machine.
        Select a model or download one to get started.<br>Your data never leaves this computer.</p>
      </div>
    </div>
    <div class="input-bar">
      <textarea id="promptInput" placeholder="Type your message..."
        rows="1" onkeydown="handleKey(event)"
        oninput="autoResize(this)"></textarea>
      <button class="btn btn-primary" id="sendBtn" onclick="sendMessage()" disabled>
        <span>▶</span> Send
      </button>
      <button class="btn btn-danger" id="stopBtn" onclick="stopGeneration()" style="display:none;">
        ⏹ Stop
      </button>
    </div>
  </main>
</div>

<!-- DOWNLOAD MODAL -->
<div class="modal-overlay" id="downloadModal">
  <div class="modal">
    <h2>⬇ Download Model (HuggingFace)</h2>
    <label style="font-size:12px;color:var(--text2);">Model ID (e.g. TheBloke/Llama-2-7B-GGUF)</label>
    <input type="text" id="downloadModelId" placeholder="TheBloke/Llama-2-7B-GGUF">
    <label style="font-size:12px;color:var(--text2);">Filename (e.g. llama-2-7b.Q4_K_M.gguf)</label>
    <input type="text" id="downloadFilename" placeholder="llama-2-7b.Q4_K_M.gguf">
    <div class="actions">
      <button class="btn btn-secondary" onclick="hideDownloadModal()">Cancel</button>
      <button class="btn btn-primary" onclick="downloadModel()">Download</button>
    </div>
    <div id="downloadStatus" style="margin-top:8px;font-size:12px;color:var(--yellow);"></div>
  </div>
</div>

<script>
// ============ STATE ============
const API = 'http://127.0.0.1:11434';
let currentModel = '';
let abortController = null;
let isStreaming = false;

// ============ INIT ============
async function init() {
  await checkHealth();
  await refreshModels();
  setInterval(checkHealth, 15000);
}
init();

async function checkHealth() {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  try {
    const res = await fetch(API);
    if (res.ok) {
      dot.className = 'dot';
      txt.textContent = 'Connected';
    } else {
      dot.className = 'dot offline';
      txt.textContent = 'Error';
    }
  } catch {
    dot.className = 'dot offline';
    txt.textContent = 'Disconnected';
  }
}

// ============ MODELS ============
async function refreshModels() {
  try {
    const res = await fetch(`${API}/api/tags`);
    const data = await res.json();
    const sel = document.getElementById('modelSelect');
    sel.innerHTML = '<option value="">No model loaded</option>';
    if (data.models && data.models.length > 0) {
      data.models.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.name;
        opt.textContent = `${m.name} (${m.size ? formatSize(m.size) : '?'})`;
        if (m.name === currentModel) opt.selected = true;
        sel.appendChild(opt);
      });
    }
  } catch(e) { console.error('refreshModels:', e); }
}

function onModelChange() {
  const val = document.getElementById('modelSelect').value;
  currentModel = val;
  document.getElementById('sendBtn').disabled = !val;
  document.getElementById('emptyState').style.display = 'flex';
  if (val) {
    addSystemMsg(`Model selected: ${val}. Ready to chat!`);
  }
}

function formatSize(bytes) {
  if (!bytes) return '?';
  const gb = bytes / 1e9;
  return gb >= 1 ? `${gb.toFixed(1)}GB` : `${(bytes/1e6).toFixed(0)}MB`;
}

// ============ CHAT ============
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function addSystemMsg(text) {
  removeEmptyState();
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.innerHTML = `<div class="avatar">🦙</div><div class="bubble" style="color:var(--text2);font-style:italic;">${escapeHtml(text)}</div>`;
  document.getElementById('chatArea').appendChild(div);
  scrollDown();
}

function removeEmptyState() {
  const es = document.getElementById('emptyState');
  if (es) es.style.display = 'none';
}

function scrollDown() {
  const ca = document.getElementById('chatArea');
  requestAnimationFrame(() => { ca.scrollTop = ca.scrollHeight; });
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function addUserMessage(text) {
  removeEmptyState();
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="avatar">👤</div><div class="bubble">${escapeHtml(text)}</div>`;
  document.getElementById('chatArea').appendChild(div);
  scrollDown();
}

function addAssistantBubble() {
  removeEmptyState();
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'currentAssistant';
  div.innerHTML = `<div class="avatar">🦙</div><div class="bubble"><span id="currentText"></span><span class="cursor" id="currentCursor"></span></div>`;
  document.getElementById('chatArea').appendChild(div);
  scrollDown();
  return div;
}

async function sendMessage() {
  if (isStreaming) return;
  const input = document.getElementById('promptInput');
  const text = input.value.trim();
  if (!text || !currentModel) return;

  input.value = '';
  input.style.height = 'auto';
  addUserMessage(text);
  addAssistantBubble();

  const temp = parseFloat(document.getElementById('temperature').value);
  const maxT = parseInt(document.getElementById('maxTokens').value);
  const topP = parseFloat(document.getElementById('topP').value);

  document.getElementById('sendBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = 'flex';
  isStreaming = true;

  abortController = new AbortController();

  try {
    const res = await fetch(`${API}/api/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Stream': 'true' },
      body: JSON.stringify({
        model: currentModel,
        prompt: text,
        stream: true,
        temperature: temp,
        max_tokens: maxT,
        top_p: topP
      }),
      signal: abortController.signal
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullResponse = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6).trim();
          if (data === '[DONE]') break;
          try {
            const j = JSON.parse(data);
            if (j.response) {
              fullResponse += j.response;
              const textEl = document.getElementById('currentText');
              if (textEl) textEl.textContent = fullResponse;
              scrollDown();
            }
          } catch {}
        }
      }
    }

    // Clean up cursor
    const cursor = document.getElementById('currentCursor');
    if (cursor) cursor.remove();
  } catch(e) {
    if (e.name !== 'AbortError') {
      const textEl = document.getElementById('currentText');
      if (textEl) textEl.textContent += '\n\n[Error: ' + e.message + ']';
    }
  }

  resetInputState();
}

function stopGeneration() {
  if (abortController) abortController.abort();
  const cursor = document.getElementById('currentCursor');
  if (cursor) cursor.remove();
  resetInputState();
}

function resetInputState() {
  isStreaming = false;
  abortController = null;
  document.getElementById('sendBtn').style.display = 'flex';
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('promptInput').focus();
}

// ============ DOWNLOAD ============
const MODEL_FILENAMES = {
  'bartowski/Llama-3.3-70B-Instruct-GGUF':          'Llama-3.3-70B-Instruct-Q4_K_M.gguf',
  'bartowski/Meta-Llama-3.1-70B-Instruct-GGUF':     'Meta-Llama-3.1-70B-Instruct-Q4_K_M.gguf',
  'Qwen/Qwen2-72B-Instruct-GGUF':                   'qwen2-72b-instruct-q4_k_m.gguf',
  'bartowski/Qwen2.5-72B-Instruct-GGUF':            'Qwen2.5-72B-Instruct-Q4_K_M.gguf',
  'MaziyarPanahi/Mixtral-8x22B-v0.1-GGUF':          'Mixtral-8x22B-v0.1.Q4_K_M.gguf',
  'bartowski/DeepSeek-R1-Distill-Llama-70B-GGUF':   'DeepSeek-R1-Distill-Llama-70B-Q4_K_M.gguf',
  'TheBloke/Command-R-Plus-GGUF':                    'command-r-plus.Q4_K_M.gguf',
  'TheBloke/Llama-2-70B-GGUF':                      'llama-2-70b.Q4_K_M.gguf',
};

function onDownloadModelSelect() {
  const sel = document.getElementById('downloadModelSelect');
  const btn = document.getElementById('downloadBtn');
  const fileSection = document.getElementById('downloadFilenameSection');
  const fileInput = document.getElementById('downloadFilename');
  if (sel.value) {
    fileInput.value = MODEL_FILENAMES[sel.value] || '';
    fileInput.placeholder = MODEL_FILENAMES[sel.value] || 'e.g. model-name.Q4_K_M.gguf';
    btn.disabled = false;
    fileSection.style.display = 'block';
  } else {
    fileInput.value = '';
    btn.disabled = true;
    fileSection.style.display = 'none';
  }
}

async function downloadSelectedModel() {
  const sel = document.getElementById('downloadModelSelect');
  const modelRepo = sel.value;
  const fileInput = document.getElementById('downloadFilename');
  const filename = fileInput.value.trim();
  const statusEl = document.getElementById('downloadStatus');
  const btn = document.getElementById('downloadBtn');

  if (!modelRepo || !filename) {
    statusEl.textContent = '⚠️ Select a model and enter a GGUF filename.';
    statusEl.style.color = 'var(--red)';
    return;
  }

  btn.disabled = true;
  btn.textContent = '⏳ Downloading...';
  statusEl.textContent = 'Starting download...';
  statusEl.style.color = 'var(--yellow)';

  try {
    const res = await fetch(`${API}/api/pull`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: `${modelRepo}/${filename}` })
    });

    // Read SSE stream for progress updates
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6).trim();
          if (data === '[DONE]') {
            statusEl.textContent = '✅ Download complete! Refresh models.';
            statusEl.style.color = 'var(--green)';
            btn.disabled = false;
            btn.textContent = '⬇ Download';
            refreshModels();
            return;
          }
          try {
            const j = JSON.parse(data);
            if (j.error) {
              statusEl.textContent = `❌ ${j.error}`;
              statusEl.style.color = 'var(--red)';
            } else if (j.completed !== undefined && j.total !== undefined && j.total > 0) {
              const pct = Math.round(j.completed / j.total * 100);
              statusEl.textContent = `📥 ${pct}% (${formatSize(j.completed)} / ${formatSize(j.total)})`;
              statusEl.style.color = 'var(--yellow)';
            } else if (j.status) {
              statusEl.textContent = `📦 ${j.status}`;
            }
          } catch {}
        }
      }
    }

    statusEl.textContent = '✅ Done. Refresh models.';
    statusEl.style.color = 'var(--green)';
    btn.disabled = false;
    btn.textContent = '⬇ Download';
    refreshModels();
  } catch(e) {
    statusEl.textContent = '❌ Error: ' + e.message;
    statusEl.style.color = 'var(--red)';
    btn.disabled = false;
    btn.textContent = '⬇ Download';
  }
}
